name: Gerar Build iOS Merenda
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build do App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Compile
        working-directory: mobile_app
        run: |
          flutter create . --platforms=android,ios
          flutter pub get
          flutter build ios --simulator --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-ios
          path: mobile_app/build/ios/iphonesimulator/Runner.app
