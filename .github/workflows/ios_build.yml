name: Gerar Build iOS Merenda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Ativando robô iOS
    runs-on: macos-latest
    
    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Instalando o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar Projeto e Baixar Dependências
        run: |
          cd mobile_app
          flutter create . --platforms=ios
          flutter pub get

      - name: Construindo o App iOS
        run: |
          cd mobile_app
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Disponibilizar App para Download
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-ios
          path: mobile_app/build/ios/iphoneos/Runner.app
