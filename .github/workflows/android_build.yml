name: Gerar Build Android Merenda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Ativando robô Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalando o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configurar Projeto e Injetar Regras
        working-directory: mobile_app
        run: |
          # 1. Recriar estrutura Android/iOS (Garante que os arquivos existam)
          flutter create . --platforms=android,ios
          flutter pub get
          
          # 2. Localizar arquivos para injeção
          MANIFEST_PATH=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          APP_GRADLE_PATH=$(find android -name "build.gradle" | grep "app" | head -n 1)
          
          echo "Manifest encontrado em: $MANIFEST_PATH"
          echo "App Gradle encontrado em: $APP_GRADLE_PATH"
          
          # 3. Injetar URL Scheme no AndroidManifest
          if [ -n "$MANIFEST_PATH" ]; then
            sed -i 's|</activity>|  <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="msauth.com.rango.fatec" />\n            </intent-filter>\n        </activity>|' "$MANIFEST_PATH"
          fi
          
          # 4. Injetar Desugaring e SDK no build.gradle
          if [ -n "$APP_GRADLE_PATH" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        coreLibraryDesugaringEnabled true/' "$APP_GRADLE_PATH"
            sed -i 's/dependencies {/dependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.3"/' "$APP_GRADLE_PATH"
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' "$APP_GRADLE_PATH"
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' "$APP_GRADLE_PATH"
          fi

      - name: Gerando Ícone do App
        working-directory: mobile_app
        run: dart run flutter_launcher_icons

      - name: Construindo o APK Oficial
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
