name: Gerar Build Android Merenda
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  build:
    name: Build do App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and Patch
        working-directory: mobile_app
        run: |
          flutter create . --platforms=android,ios
          flutter pub get

          # 1. Fix bigLargeIcon ambiguity (Java 17 + flutter_local_notifications)
          LIB_FILE=$(find /home/runner/.pub-cache -name "FlutterLocalNotificationsPlugin.java" 2>/dev/null | head -n 1)
          if [ -n "$LIB_FILE" ]; then
            sed -i 's/bigLargeIcon(null)/bigLargeIcon((Bitmap)null)/g' "$LIB_FILE"
            echo "Patched bigLargeIcon in $LIB_FILE"
          fi

          # 2. Enable core library desugaring (required by flutter_local_notifications)
          BUILD_GRADLE=$(find android -name "build.gradle" -path "*/app/*" 2>/dev/null | head -1)
          if [ -z "$BUILD_GRADLE" ]; then
            BUILD_GRADLE=$(find android -name "build.gradle.kts" -path "*/app/*" 2>/dev/null | head -1)
          fi

          if [ -n "$BUILD_GRADLE" ]; then
            echo "Patching $BUILD_GRADLE for desugaring"
            sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' "$BUILD_GRADLE"
            sed -i "0,/^dependencies {/s//dependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'/" "$BUILD_GRADLE"
          else
            echo "ERROR: build.gradle not found! Listing android folder:"
            find android -name "*.gradle*" 2>/dev/null
          fi

      - name: Build APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
