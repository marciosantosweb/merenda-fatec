name: Gerar Build Android Merenda
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  build:
    name: Build do App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Compile
        working-directory: mobile_app
        run: |
          flutter create . --platforms=android,ios
          flutter pub get
      - name: Fix Notifications Bug
        run: |
          LIB_FILE=$(find /home/runner/.pub-cache -name "FlutterLocalNotificationsPlugin.java" | head -n 1)
          if [ -n "$LIB_FILE" ]; then
            sed -i 's/bigLargeIcon(null)/bigLargeIcon((Bitmap)null)/g' "$LIB_FILE"
          fi
      - name: Build APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
