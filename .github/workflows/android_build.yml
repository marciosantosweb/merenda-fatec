name: Gerar Build Android Merenda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Ativando robô Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalando o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Forçar Criação do Ambiente Android
        working-directory: mobile_app
        run: |
          flutter create . --platforms=android
          flutter pub get

      - name: Construindo o APK Oficial
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
