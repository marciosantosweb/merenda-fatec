name: Gerar Build Android Merenda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Ativando robô Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          # Removido cache para evitar erros de pasta inexistente

      - name: Instalando o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar Projeto e Baixar Dependências
        run: |
          cd mobile_app
          flutter create . --platforms=android
          flutter pub get

      - name: Construindo o APK
        run: |
          cd mobile_app
          flutter build apk --release --no-tree-shake-icons

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
