name: Gerar Build Android Merenda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Ativando robô Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalando o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preparar Ambiente
        working-directory: mobile_app
        run: |
          flutter create . --platforms=android,ios
          flutter pub get
          
          # Injetar Login Microsoft
          sed -i 's|</activity>|  <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="msauth.com.rango.fatec" />\n            </intent-filter>\n        </activity>|' android/app/src/main/AndroidManifest.xml

      - name: Corrigir Erro de Notificações
        working-directory: mobile_app
        run: |
          # Patch cirúrgico no fonte da biblioteca para evitar ambiguidades no Java 17
          LIB_FILE=$(find /home/runner/.pub-cache -name "FlutterLocalNotificationsPlugin.java" | grep "flutter_local_notifications" | head -n 1)
          if [ -n "$LIB_FILE" ]; then
            sed -i 's/bigLargeIcon(null)/bigLargeIcon((Bitmap)null)/g' "$LIB_FILE"
          fi

      - name: Gerando Ícone do App
        working-directory: mobile_app
        run: dart run flutter_launcher_icons

      - name: Construindo o APK Oficial
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: merenda-fatec-android
          path: "**/app-release.apk"
