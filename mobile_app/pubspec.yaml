name: rango
description: Rango! - Sistema de Merenda Noturna - Fatec São Sebastião
publish_to: 'none'
version: 1.1.50+52

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.20.2
  sqflite: ^2.3.0
  path: ^1.8.3
  google_fonts: ^8.0.2
  shared_preferences: ^2.2.1
  provider: ^6.0.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_web_auth_2: ^5.0.2
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icone-to-com-fome.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
