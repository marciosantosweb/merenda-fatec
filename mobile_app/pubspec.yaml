name: rango
description: Rango! - Sistema de Merenda Noturna - Fatec São Sebastião
publish_to: 'none'
version: 1.1.11+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.18.1
  sqflite: ^2.3.0
  path: ^1.8.3
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.1
  provider: ^6.0.5
  flutter_local_notifications: ^16.1.0
  timezone: ^0.9.2
  flutter_web_auth_2: ^4.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icone-to-com-fome.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
